<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; connect-src 'self' https://*.supabase.co; img-src 'self' data:; font-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none';"
    />
    <link rel="icon" type="image/png" href="assets/cappello_di_paglia.png" />
    <title>One Piece — Tracker New Edition</title>
    <link rel="stylesheet" href="styles.css" />
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"
    ></script>
    <script defer src="app.js"></script>
  </head>
  <body>
    <div class="wrap">
      <header>
        <img
          class="logo-icon"
          src="assets/jolly_roger.png"
          alt="Jolly Roger di One Piece"
          width="54"
          height="54"
          decoding="async"
        />
        <h1>One Piece Manga Tracker</h1>
      </header>

      <div class="card" id="app">
        <div class="progress-wrapper">
          <div class="progress-container">
            <div id="progressBar" class="progress-bar"></div>
          </div>
          <div id="progressPercent" class="progress-percent">0%</div>
        </div>

        <div class="controls" id="authControls">
          <input id="email" type="email" placeholder="Email" />
          <input id="password" type="password" placeholder="Password" />
          <button id="loginBtn">Login</button>
          <button id="logoutBtn" class="ghost hidden">Logout</button>
          <span
            class="small muted"
            id="userEmail"
            style="margin-left: auto; align-self: center"
          ></span>
        </div>

        <div class="controls">
          <input id="search" type="text" placeholder="Cerca volume..." />
          <button id="hideBoughtBtn" class="ghost">Nascondi comprati</button>
          <button id="exportBtn" class="ghost" style="margin-left: auto">
            Export
          </button>
          <button id="importBtn" class="ghost">Import</button>
        </div>

        <div class="stats-bar">
          <div>Totale: <span id="total">0</span></div>
          <div>
            Comprati:
            <strong id="bought" style="color: var(--success)">0</strong>
          </div>
        </div>

        <div id="mangaList" class="main-list"></div>

        <footer>
          <span>Star Comics - New Edition</span>
          <span>Database: Supabase Online</span>
        </footer>
      </div>
    </div>

    <!-- Toast Notification element -->
    <div id="toast">Devi effettuare il login per usare questa funzione</div>
  </body>
</html>
